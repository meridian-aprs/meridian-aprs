name: meridian_aprs
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  intl: ^0.20.2
  shared_preferences: ^2.3.0
  provider: ^6.1.0
  flutter_libserialport: ^0.6.0
  dynamic_color: ^1.8.1
  m3e_design: ^0.1.0
  flutter_m3shapes: ^1.0.0
  animations: ^2.0.11
  material_symbols_icons: ^4.2906.0
  flutter_blue_plus: ^1.33.0
  geolocator: ^13.0.0
  http: ^1.2.0
  flutter_foreground_task: ^8.17.0
  permission_handler: ^12.0.1
  flutter_map_cache: ^2.0.0+1
  dio_cache_interceptor: ^4.0.6
  http_cache_file_store: ^2.0.1
  http_cache_core: ^1.1.3
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  live_activities: ^2.4.7
  flutter_local_notifications: ^18.0.0
  local_notifier: ^0.1.6
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.0
  fake_async: ^1.3.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/aprs_symbols/aprs-symbols-64-0.png
    - assets/aprs_symbols/aprs-symbols-64-1.png
    - assets/icons/
    - assets/icons/generated/
    - assets/wordmarks/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#F4F6F8"
  color_dark: "#19181B"
  image: assets/icons/generated/icon-1024.png
  android_12:
    image: assets/icons/generated/icon-adaptive-fg-432.png
    color: "#F4F6F8"
    icon_background_color: "#F4F6F8"
    color_dark: "#19181B"
    icon_background_color_dark: "#19181B"
  ios: true
  android: true
  web: false

flutter_launcher_icons:
  image_path: "assets/icons/generated/icon-1024.png"

  android: "launcher_icon"
  adaptive_icon_background: "assets/icons/generated/icon-adaptive-bg-432.png"
  adaptive_icon_foreground: "assets/icons/generated/icon-adaptive-fg-432.png"
  min_sdk_android: 21

  ios: true
  remove_alpha_ios: true

  macos:
    generate: true
    image_path: "assets/icons/generated/icon-1024.png"

  windows:
    generate: true
    image_path: "assets/icons/generated/icon-1024.png"
    icon_size: 256

  web:
    generate: true
    image_path: "assets/icons/generated/icon-1024.png"
    background_color: "#FFFFFF"
    theme_color: "#4D1D8C"
